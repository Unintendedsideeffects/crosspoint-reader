<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrossPoint Reader - Wallpaper Converter</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; line-height: 1.6; }
    .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
    canvas { border: 1px solid #000; max-width: 100%; height: auto; display: block; margin: 10px 0; }
    .btn { background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    .btn:disabled { background: #ccc; }
    .status { margin-top: 10px; font-style: italic; }
  </style>
</head>
<body>
  <h1>Wallpaper Converter</h1>
  <p>Resize and convert images for Xteink X4 (480x800).</p>
  <div class="card">
    <input type="file" id="fileInput" accept="image/*" />
    <div id="previewContainer" style="display:none;">
      <canvas id="canvas"></canvas>
      <button id="uploadBtn" class="btn">Upload to /sleep</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const uploadBtn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');

    const TARGET_WIDTH = 480;
    const TARGET_HEIGHT = 800;

    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          canvas.width = TARGET_WIDTH;
          canvas.height = TARGET_HEIGHT;
          
          // Cover/Crop logic
          const scale = Math.max(TARGET_WIDTH / img.width, TARGET_HEIGHT / img.height);
          const x = (TARGET_WIDTH / 2) - (img.width / 2) * scale;
          const y = (TARGET_HEIGHT / 2) - (img.height / 2) * scale;
          
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, TARGET_WIDTH, TARGET_HEIGHT);
          ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
          
          // Simple Grayscale
          const imageData = ctx.getImageData(0, 0, TARGET_WIDTH, TARGET_HEIGHT);
          const data = imageData.data;
          for (let i = 0; i < data.length; i += 4) {
            const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            data[i] = data[i+1] = data[i+2] = gray;
          }
          ctx.putImageData(imageData, 0, 0);
          
          document.getElementById('previewContainer').style.display = 'block';
          status.innerText = 'Image processed. Ready to upload.';
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    };

    async function ensureFolder(path, name) {
      const formData = new FormData();
      formData.append('path', path);
      formData.append('name', name);
      const response = await fetch('/mkdir', { method: 'POST', body: formData });
      if (response.ok) return;

      const message = (await response.text()).toLowerCase();
      if (message.includes('already') && message.includes('exist')) return;
      if (message.includes('exists')) return;
      throw new Error("Failed to create folder '" + name + "': " + message);
    }

    uploadBtn.onclick = async () => {
      uploadBtn.disabled = true;
      status.innerText = 'Converting to BMP...';
      
      try {
        // This is a placeholder for a proper BMP conversion.
        // For now we'll just send the PNG/JPG as is, but Crosspoint prefers BMP.
        // In a real implementation, we'd use a JS BMP library.
        canvas.toBlob(async (blob) => {
          const formData = new FormData();
          formData.append('file', blob, 'custom_wallpaper.png');
          
          status.innerText = 'Ensuring /sleep exists...';
          await ensureFolder('/', 'sleep');

          status.innerText = 'Uploading to /sleep...';
          const resp = await fetch('/upload?path=/sleep', {
            method: 'POST',
            body: formData
          });
          
          if (resp.ok) {
            status.innerText = 'Success! Use Custom sleep mode with images in /sleep. A direct SD-card /.sleep folder also works and takes priority.';
          } else {
            status.innerText = 'Upload failed: ' + await resp.text();
          }
          uploadBtn.disabled = false;
        }, 'image/png');
      } catch (err) {
        status.innerText = 'Error: ' + err.message;
        uploadBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
