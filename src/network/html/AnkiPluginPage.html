<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CrossPoint Reader - Anki Plugin</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; line-height: 1.6; }
    .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Anki Support (Beta)</h1>
  <p>To use Anki cards on your CrossPoint Reader:</p>
  <div class="card">
    <ol>
      <li>Export your Anki cards to a simple <code>anki.json</code> format.</li>
      <li>Upload <code>anki.json</code> to the root of your SD card.</li>
      <li>Open the Anki Activity from the Home screen.</li>
    </ol>
    <p>Coming Soon: Direct integration with AnkiWeb / AnkiConnect.</p>
  </div>
</body>
</html>
