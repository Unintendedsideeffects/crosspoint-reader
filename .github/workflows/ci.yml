name: CI (build)

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run clang-format
        run: |
          uv run ./bin/clang-format-fix
          git diff --exit-code || (echo "Please run 'bin/clang-format-fix' to fix formatting issues" && exit 1)

  feature-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Validate feature key synchronization
        run: uv run python scripts/check_feature_key_sync.py

      - name: Validate generated platformio-custom.ini is up to date
        run: |
          uv run python scripts/generate_build_config.py --profile standard
          git diff --exit-code -- platformio-custom.ini

  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: python -m pip install -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Run host tests
        run: bash test/run_host_tests.sh

  contract-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate published HTTP contract
        run: python3 scripts/validate_contract_server.py

  cleanup-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ensure pip for PlatformIO
        run: |
          uv run python -m ensurepip --upgrade || true
          uv run python -m pip --version

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-platformio-

      - name: Run cleanup checks
        run: |
          uv run vulture scripts
          bash scripts/check_feature_boundaries.sh
          uv run pio check -e default

  hardware-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Check hardware coding patterns
        run: python3 scripts/check_hardware_patterns.py

  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: python -m pip install -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Run cppcheck
        run: pio check --fail-on-defect low --fail-on-defect medium --fail-on-defect high

  clang-tidy:
    # Non-blocking: intentionally NOT in test-status.needs during rollout.
    # Produces warnings visible in the Actions tab without failing PRs.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: python -m pip install -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Generate compile_commands.json
        run: pio run -t compiledb

      - name: Run clang-tidy on src/
        run: |
          set -euo pipefail
          # Find all first-party source files (exclude lib/ third-party code)
          find src \( -name '*.cpp' -o -name '*.h' \) | sort | while read -r f; do
            echo "::group::$f"
            clang-tidy -p .pio/build/default "$f" --quiet 2>&1 || true
            echo "::endgroup::"
          done

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Check for reusable build artifact
        id: reuse
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: firmware.bin
        run: python3 scripts/ci/check_reusable_artifact.py

      - name: Download reused artifact
        if: steps.reuse.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE_URL: ${{ steps.reuse.outputs.archive_url }}
          OUTPUT_DIR: .pio/build/default
        run: python3 scripts/ci/download_artifact.py

      - uses: actions/setup-python@v6
        if: steps.reuse.outputs.found != 'true'
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        if: steps.reuse.outputs.found != 'true'
        run: python -m pip install -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Build CrossPoint
        if: steps.reuse.outputs.found != 'true'
        run: |
          set -euo pipefail
          pio run | tee pio.log

      - name: Enforce flash headroom
        if: steps.reuse.outputs.found != 'true'
        run: |
          python scripts/check_flash_headroom.py \
            --log pio.log \
            --firmware .pio/build/default/firmware.bin \
            --min-headroom-kb 64

      - name: Extract firmware stats
        if: steps.reuse.outputs.found != 'true'
        run: |
          set -euo pipefail
          ram_line="$(grep -E "RAM:\\s" -m1 pio.log || true)"
          flash_line="$(grep -E "Flash:\\s" -m1 pio.log || true)"
          echo "ram_line=${ram_line}" >> "$GITHUB_OUTPUT"
          echo "flash_line=${flash_line}" >> "$GITHUB_OUTPUT"
          if [ -z "$ram_line" ]; then echo "::warning::RAM usage not found in build log — PlatformIO output format may have changed"; fi
          if [ -z "$flash_line" ]; then echo "::warning::Flash usage not found in build log — PlatformIO output format may have changed"; fi
          {
            echo "## Firmware build stats"
            if [ -n "$ram_line" ]; then echo "- ${ram_line}"; else echo "- RAM: not found"; fi
            if [ -n "$flash_line" ]; then echo "- ${flash_line}"; else echo "- Flash: not found"; fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report reused build
        if: steps.reuse.outputs.found == 'true'
        run: |
          {
            echo "## Firmware build stats — reused"
            echo ""
            echo "Reused artifact from run [#${{ steps.reuse.outputs.source_run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ steps.reuse.outputs.source_run_id }})."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload firmware.bin artifact
        uses: actions/upload-artifact@v6
        with:
          name: firmware.bin
          path: .pio/build/default/firmware.bin
          if-no-files-found: error

  # This job is used as the PR required actions check, allows for changes to other steps in the future without breaking
  # PR requirements.
  test-status:
    name: Test Status
    needs:
      - build
      - clang-format
      - feature-sync
      - host-tests
      - contract-server
      - hardware-patterns
      - cppcheck
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail because needed jobs failed
        # Fail if any job failed or was cancelled (skipped jobs are ok)
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - name: Success
        run: exit 0
